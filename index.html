<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuan Huy - Coding Journey</title>
    <style>
        /* GIAO DIỆN NỀN */
        body {
            font-family: 'Consolas', 'Courier New', monospace;
            color: #ffffff;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.9), 0px 0px 8px rgba(0,0,0,0.5); 
            margin: 0;
            padding: 30px 15px;
            display: flex;
            
            /* Dịch sát mép trái (chỉ cách lề 2vw) để không che màn hình bên phải */
            align-items: flex-start; 
            padding-left: 2vw; 
            overflow-x: hidden;
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.85); 
        }
        .fallback-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -3;
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            filter: brightness(0.85); 
        }

        /* BỐ CỤC CHIA 2 CỘT */
        .layout-wrapper {
            display: flex;
            gap: 25px; 
            align-items: flex-start;
            width: 100%;
        }

        /* KHUNG BÊN TRÁI: DANH SÁCH TÀI KHOẢN */
        .sidebar {
            width: 280px; 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            flex-shrink: 0; 
        }

        .sidebar h2 {
            font-size: 1.2em;
            margin-top: 0;
            text-transform: uppercase;
            border-bottom: 1px dashed rgba(255,255,255,0.4);
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* KHUNG HIỂN THỊ ACCOUNT (ĐÃ LÀM SÁNG LÊN) */
        .acc-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* Sáng như ô nhập liệu */
            background: rgba(255, 255, 255, 0.25); 
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .acc-item:hover { 
            background: rgba(255, 255, 255, 0.4); 
            border-color: #fff; 
            box-shadow: 0 4px 10px rgba(255,255,255,0.3);
        }
        .acc-link {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95em;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
        }
        .acc-link:hover { text-decoration: underline; color: #e0f7fa; }

        /* KHUNG CHÍNH: DANH SÁCH BÀI TẬP */
        .container {
            max-width: 650px; 
            width: 100%;
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* TIÊU ĐỀ & MÈO GỐC */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        .title-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #ffffff;
            text-align: center;
            margin: 0;
            letter-spacing: 1px;
            font-size: 1.6em; 
            text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
        }
        .subtitle {
            color: #e0e0e0;
            font-size: 0.85em;
            margin-top: 5px;
            font-style: italic;
        }
        .smoking-cat {
            width: 100px; 
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* KHU VỰC CHỨA SỐ LƯỢNG VÀ NÚT CỘNG */
        .stats-and-add {
            display: flex;
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed rgba(255,255,255,0.4);
        }
        .total-text {
            color: #ffffff; 
            font-size: 1.1em;
        }
        
        /* NÚT CỘNG */
        .toggle-btn {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.6);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-shadow: none; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: 0.3s;
            font-weight: bold;
        }
        .toggle-btn:hover { background: rgba(255, 255, 255, 0.5); transform: scale(1.05); }
        .btn-large { width: 40px; height: 40px; border-radius: 8px; font-size: 1.5em; }
        .btn-small { width: 30px; height: 30px; border-radius: 6px; font-size: 1.2em; }

        /* FORM ẨN/HIỆN (ĐÃ FIX LỖI TỰ HIỆN) */
        .add-form {
            display: none; /* Mặc định ẨN hoàn toàn */
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        /* Chỉ hiển thị khi có class 'active' */
        .add-form.active.grid-form { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            padding: 20px; 
        }
        .add-form.active.flex-form { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            padding: 15px; 
        }
        
        /* Ô NHẬP LIỆU CHUNG */
        input {
            background: rgba(255, 255, 255, 0.25); 
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 12px;
            border-radius: 5px;
            font-family: inherit;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
            transition: 0.2s;
        }
        input:focus { background: rgba(255, 255, 255, 0.4); border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        input::placeholder { color: rgba(255,255,255,0.8); text-shadow: none; }
        
        .add-btn {
            background: rgba(255,255,255,0.9);
            color: #000;
            font-weight: bold;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            text-shadow: none; 
        }
        .grid-form .add-btn { grid-column: 1 / -1; }
        .add-btn:hover { background: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.5); }

        /* DANH SÁCH BÀI TẬP */
        .platform-section {
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1); 
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .platform-header {
            background-color: rgba(0, 0, 0, 0.2); 
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            transition: 0.3s;
        }
        .platform-header:hover { background-color: rgba(0, 0, 0, 0.3); }
        .arrow { transition: transform 0.3s ease; }
        .platform-header.active .arrow { transform: rotate(180deg); }
        .platform-content { display: none; padding: 15px; }

        /* BẢNG */
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 0.9em;
        }
        th { color: #f0f0f0; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.4); }
        tr:hover { background-color: rgba(255, 255, 255, 0.1); }
        .lang-badge {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 3px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .submission-link {
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .submission-link:hover { text-decoration: underline; color: #ddd; }
        
        .delete-btn {
            background: none;
            border: none;
            color: #ff5252;
            cursor: pointer;
            opacity: 0.8;
            transition: 0.2s;
            text-shadow: 0 0 2px black;
        }
        .delete-btn:hover { opacity: 1; transform: scale(1.2); }

        @media (max-width: 1000px) {
            body { padding-left: 5vw; }
            .layout-wrapper { flex-direction: column; align-items: center; }
            .sidebar { width: 100%; max-width: 650px; }
        }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="bg.mp4" type="video/mp4">
    </video>
    <div class="fallback-bg"></div>

    <div class="layout-wrapper">
        
        <div class="sidebar">
            <h2>
                👤 My Profiles
                <button type="button" class="toggle-btn btn-small" id="toggle-acc-btn" title="Thêm Profile">+</button>
            </h2>

            <form class="add-form flex-form" id="acc-form">
                <input type="text" id="a-platform" placeholder="Platform (VD: Codeforces)" required>
                <input type="text" id="a-link" placeholder="Profile Link" required>
                <button type="submit" class="add-btn">LƯU PROFILE</button>
            </form>

            <div id="accounts-list"></div>
        </div>

        <div class="container">
            <div class="header-container">
                <div class="title-group">
                    <h1>Tuan Huy All Problem Solved</h1>
                    <div class="subtitle">from Informatics of Lam Son (ILS)</div>
                </div>
                <img src="meo-hut-thuoc.jpg" class="smoking-cat" alt="Mèo hút thuốc">
            </div>

            <div class="stats-and-add">
                <div class="total-text">
                    Total Solved: <strong id="total-count" style="font-size: 1.2em;">0</strong>
                </div>
                <button type="button" class="toggle-btn btn-large" id="toggle-form-btn" title="Add Problem">+</button>
            </div>

            <form class="add-form grid-form" id="problem-form">
                <input type="text" id="p-name" placeholder="Problem Name" required>
                <input type="text" id="p-platform" placeholder="Platform" required>
                <input type="text" id="p-lang" placeholder="Language (e.g., C++)" required>
                <input type="text" id="p-link" placeholder="Submission Link" required>
                <button type="submit" class="add-btn">ADD THIS SUFFERING</button>
            </form>

            <div id="platforms-container">
            </div>
        </div>

    </div>

    <script>
        let myProblems = [];
        try {
            myProblems = JSON.parse(localStorage.getItem('myCodingJourneyData')) || [];
            let dataChanged = false;
            myProblems = myProblems.map(p => {
                let upperPlatform = p.platform.toUpperCase().trim();
                if(p.platform !== upperPlatform) dataChanged = true;
                return { ...p, platform: upperPlatform };
            });
            if(dataChanged) localStorage.setItem('myCodingJourneyData', JSON.stringify(myProblems));
        } catch(e) { myProblems = []; }

        let myAccounts = [];
        try {
            myAccounts = JSON.parse(localStorage.getItem('myAccountsData')) || [];
        } catch(e) { myAccounts = []; }

        document.getElementById('toggle-form-btn').addEventListener('click', () => {
            document.getElementById('problem-form').classList.toggle('active');
        });

        document.getElementById('toggle-acc-btn').addEventListener('click', () => {
            document.getElementById('acc-form').classList.toggle('active');
        });

        function renderAccounts() {
            const accContainer = document.getElementById('accounts-list');
            accContainer.innerHTML = '';

            myAccounts.forEach(acc => {
                const div = document.createElement('div');
                div.className = 'acc-item';
                div.innerHTML = `
                    <a href="${acc.link}" target="_blank" class="acc-link">
                        🔗 ${acc.platform}
                    </a>
                    <button class="delete-btn" onclick="deleteAccount(${acc.id})" title="Xóa tài khoản này">✖</button>
                `;
                accContainer.appendChild(div);
            });
        }

        function renderUI() {
            document.getElementById('total-count').textContent = myProblems.length;
            const container = document.getElementById('platforms-container');
            container.innerHTML = ''; 

            const grouped = {};
            myProblems.forEach(p => {
                if (!grouped[p.platform]) grouped[p.platform] = [];
                grouped[p.platform].push(p);
            });

            for (const platform in grouped) {
                const problems = grouped[platform];
                const section = document.createElement('div');
                section.className = 'platform-section';

                const header = document.createElement('div');
                header.className = 'platform-header';
                header.innerHTML = `<span>[${platform}]</span><span class="arrow">▼</span>`;

                const content = document.createElement('div');
                content.className = 'platform-content';

                const searchInput = document.createElement('input');
                searchInput.type = 'text';
                searchInput.style.marginBottom = '15px';
                searchInput.placeholder = `Press Enter to search in ${platform}...`;

                const table = document.createElement('table');
                table.innerHTML = `
                    <thead><tr><th>Problem</th><th>Lang</th><th></th></tr></thead>
                    <tbody></tbody>
                `;
                const tbody = table.querySelector('tbody');

                const renderTable = (data) => {
                    tbody.innerHTML = '';
                    data.forEach(p => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td><a href="${p.link}" target="_blank" class="submission-link">${p.name}</a></td>
                            <td><span class="lang-badge">${p.language}</span></td>
                            <td style="text-align: right;"><button class="delete-btn" onclick="deleteProblem(${p.id})">✖</button></td>
                        `;
                        tbody.appendChild(row);
                    });
                };
                renderTable(problems);

                searchInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault(); 
                        const keyword = e.target.value.toLowerCase();
                        const filtered = problems.filter(p => p.name.toLowerCase().includes(keyword));
                        renderTable(filtered);
                    }
                });

                header.addEventListener('click', () => {
                    header.classList.toggle('active');
                    content.style.display = content.style.display === 'block' ? 'none' : 'block';
                });

                content.appendChild(searchInput);
                content.appendChild(table);
                section.appendChild(header);
                section.appendChild(content);
                container.appendChild(section);
            }
        }

        document.getElementById('acc-form').addEventListener('submit', function(e) {
            e.preventDefault(); 
            const newAcc = {
                id: Date.now(),
                platform: document.getElementById('a-platform').value.toUpperCase().trim(),
                link: document.getElementById('a-link').value.trim()
            };
            myAccounts.push(newAcc);
            localStorage.setItem('myAccountsData', JSON.stringify(myAccounts));
            renderAccounts();
            
            document.getElementById('acc-form').reset();
            document.getElementById('acc-form').classList.remove('active'); 
        });

        window.deleteAccount = function(id) {
            if(confirm("Xóa Profile này?")) {
                myAccounts = myAccounts.filter(a => a.id !== id);
                localStorage.setItem('myAccountsData', JSON.stringify(myAccounts));
                renderAccounts();
            }
        }

        document.getElementById('problem-form').addEventListener('submit', function(e) {
            e.preventDefault(); 
            const newProblem = {
                id: Date.now(),
                name: document.getElementById('p-name').value.trim(),
                platform: document.getElementById('p-platform').value.toUpperCase().trim(),
                language: document.getElementById('p-lang').value.trim(),
                link: document.getElementById('p-link').value.trim()
            };
            myProblems.push(newProblem);
            localStorage.setItem('myCodingJourneyData', JSON.stringify(myProblems));
            renderUI();
            
            document.getElementById('problem-form').reset();
            document.getElementById('problem-form').classList.remove('active'); 
        });

        window.deleteProblem = function(id) {
            if(confirm("Xóa bài này hả?")) {
                myProblems = myProblems.filter(p => p.id !== id);
                localStorage.setItem('myCodingJourneyData', JSON.stringify(myProblems));
                renderUI();
            }
        }

        renderUI();
        renderAccounts();
    </script>
</body>
</html>
